name: Java CD

on:
  push:
  pull_request:
    branches:
      - main
      - release
      - feat/add-cd
  workflow_run:
    workflows: ["Java CI"]
    types:
      - completed

jobs:
  docker-hub-publish:
    runs-on: ubuntu-latest  

    env:
      SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME_PROD }}
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD_PROD }}
      SPRING_DATASOURCE_DB: ${{ secrets.SPRING_DATASOURCE_DB_PROD }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      DB_HOST: ${{ secrets.DB_HOST_PROD }}
      DB_PORT: ${{ secrets.DB_PORT_PROD }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Compose Images
        run: docker compose -f docker-compose.yml build

      - name: Push Docker Images to Docker Hub
        run: docker compose -f docker-compose.yml push