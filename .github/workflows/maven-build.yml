name: Java CI

on: [push, pull_request]

permissions:
  contents: read
  security-events: write

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    env:
      SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
      SPRING_DATASOURCE_DB: ${{ secrets.SPRING_DATASOURCE_DB }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      CONNECTION_TO_DATABASE_HOST_PORT: ${{ secrets.CONNECTION_TO_DATABASE_HOST_PORT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build and run Docker Compose
        run: docker compose -f docker-compose.yml up -d --build

      - name: Run SpotBugs
        run: docker exec spring_boot_app ./mvnw spotbugs:check

      - name: Run unit tests and system tests
        run: docker exec spring_boot_app ./mvnw test

  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/maven-3-jdk-17@master
        continue-on-error: true
        with:
          args: --sarif-file-output=snyk.sarif
          json: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    
      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif
      
      - name: Check for Critical vulnerabilities
        run: |
          if [ -f snyk.json ]; then
            if grep -q "Critical" snyk.json; then
              echo "Critical vulnerabilities found!"
              exit 1
            else
              echo "No critical vulnerabilities found."
            fi
          else
            echo "No Snyk report generated."
            exit 1
          fi
    
  jmeter-load-test:
    runs-on: ubuntu-latest
    needs: build-and-run

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build and run Docker Compose
        run: docker compose -f docker-compose.test.yml up -d --build
    
      - name: Run Jmeter Load Test
        run: |
          docker exec spring_boot_app \
            jmeter -n \
            -t ./booking_load_test_plan.jmx \
            -l ./results/test_load_results.jtl \
            -j ./results/jmeter_load.log \
            -JtargetedServerName=spring_boot_app \
            -JtargetedServerPort=8080 \
            -JdurationThresholdInMs=500 \
            -JimageDir="./sctp/garang-guni-backend/src/main/resources/static/test-photos" \
            -JnumOfThread=20 \
            -JnumOfLoop=20

      - name: Upload Load Test Results
        uses: actions/upload-artifact@v3
        with:
          name: load-test-results-${{ github.run_id }}
          path: ./results/test_load_results.jtl
      
      - name: Upload JMeter Logs
        uses: actions/upload-artifact@v3
        with:
          name: load-test-logs-${{ github.run_id }}
          path: ./results/jmeter_load.log

  jmeter-performance-test:
    runs-on: ubuntu-latest
    needs: jmeter-load-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build and run Docker Compose
        run: docker compose -f docker-compose.test.yml up -d --build
    
      - name: Run Jmeter Performance Test
        run: |
            docker exec spring_boot_app \
            jmeter -n \
            -t ./booking_load_test_plan.jmx \
            -l ./results/test_performance_results.jtl \
            -j ./results/jmeter_performance.log \
            -JtargetedServerName=spring_boot_app \
            -JtargetedServerPort=8080 \
            -JdurationThresholdInMs=500 \
            -JimageDir="./sctp/garang-guni-backend/src/main/resources/static/test-photos" \
            -JnumOfThread=10 \
            -JnumOfLoop=10

      - name: Upload Performance Test Results
        uses: actions/upload-artifact@v3
        with:
          name: performance-test-results-${{ github.run_id }}
          path: ./results/test_performance_results.jtl
        
      - name: Upload JMeter Logs
        uses: actions/upload-artifact@v3
        with:
          name: performance-test-logs-${{ github.run_id }}
          path: ./results/jmeter_performance.log