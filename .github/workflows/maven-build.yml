name: Java CI

on: [push, pull_request]

permissions:
  contents: read

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    env:
      SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
      SPRING_DATASOURCE_DB: ${{ secrets.SPRING_DATASOURCE_DB }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      CONNECTION_TO_DATABASE_HOST_PORT: ${{ secrets.CONNECTION_TO_DATABASE_HOST_PORT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build and run Docker Compose
        run: docker compose up -d --build
  
  spotbugs:
    runs-on: ubuntu-latest
    needs: build-and-run 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Run SpotBugs
        run: docker exec spring_boot_app ./mvnw spotbugs:check

  snyk:
    runs-on: ubuntu-latest
    needs: build-and-run 

    env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth $SNYK_TOKEN

      - name: Run Snyk Test
        run: snyk test --all-projects --file=pom.xml --fail-on=none

  test:
    runs-on: ubuntu-latest
    needs: build-and-run

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Run Tests
        run: docker exec spring_boot_app ./mvnw test
