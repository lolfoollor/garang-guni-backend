name: Java CI

on: [push, pull_request]

permissions:
  contents: write
  security-events: write

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    env:
      SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
      SPRING_DATASOURCE_DB: ${{ secrets.SPRING_DATASOURCE_DB }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      CONNECTION_TO_DATABASE_HOST_PORT: ${{ secrets.CONNECTION_TO_DATABASE_HOST_PORT }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build and run Docker Compose
        run: docker compose -f docker-compose.yml up -d --build

      - name: Run SpotBugs
        run: docker exec spring_boot_app ./mvnw spotbugs:check

      - name: Run unit tests and system tests
        run: docker exec spring_boot_app ./mvnw test

  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/maven-3-jdk-17@master
        continue-on-error: true
        with:
          args: --sarif-file-output=snyk.sarif
          json: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    
      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif
      
      - name: Check for Critical vulnerabilities
        run: |
          if [ -f snyk.json ]; then
            if grep -q "Critical" snyk.json; then
              echo "Critical vulnerabilities found!"
              exit 1
            else
              echo "No critical vulnerabilities found."
            fi
          else
            echo "No Snyk report generated."
            exit 1
          fi
    
  jmeter-load-test:
    runs-on: ubuntu-latest
    needs: build-and-run

    env:
        SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
        SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
        SPRING_DATASOURCE_DB: ${{ secrets.SPRING_DATASOURCE_DB }}
        JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        CONNECTION_TO_DATABASE_HOST_PORT: ${{ secrets.CONNECTION_TO_DATABASE_HOST_PORT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build and run Docker Compose
        run: docker compose -f docker-compose.test.yml up -d --build

      - name: Wait for Spring Boot application to start
        run: |
          echo "Waiting for Spring Boot application to start..."
          sleep 20

      - name: Run Jmeter Load Test
        run: |
          docker exec spring_boot_app \
            jmeter -n \
            -t ./booking_load_test_plan.jmx \
            -l ./results/test_load_results.jtl \
            -j ./results/jmeter_load.log \
            -JtargetedServerName=localhost \
            -JtargetedServerPort=8080 \
            -JdurationThresholdInMs=500 \
            -JimageDir="./src/main/resources/static/test-photos" \
            -JnumOfThread=20 \
            -JnumOfLoop=20 \
            -e -o ./results/load-report

      - name: Copy Results from Container
        run: docker cp spring_boot_app:/app/results ./results

      - name: Upload JMeter Test Result, Logs and reports
        uses: actions/upload-artifact@v3
        with:
          name: load-test-${{ github.run_id }}
          path: ./results

  jmeter-performance-test:
    runs-on: ubuntu-latest
    needs: build-and-run

    env:
        SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
        SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
        SPRING_DATASOURCE_DB: ${{ secrets.SPRING_DATASOURCE_DB }}
        JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        CONNECTION_TO_DATABASE_HOST_PORT: ${{ secrets.CONNECTION_TO_DATABASE_HOST_PORT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build and run Docker Compose
        run: docker compose -f docker-compose.test.yml up -d --build

      - name: Wait for Spring Boot application to start
        run: |
          echo "Waiting for Spring Boot application to start..."
          sleep 20

      - name: Run Jmeter Performance Test
        run: |
            docker exec spring_boot_app \
            jmeter -n \
            -t ./booking_performance_test_plan.jmx \
            -l ./results/test_performance_results.jtl \
            -j ./results/jmeter_performance.log \
            -JtargetedServerName=localhost \
            -JtargetedServerPort=8080 \
            -JdurationThresholdInMs=500 \
            -JimageDir="./src/main/resources/static/test-photos" \
            -JnumOfThread=10 \
            -JnumOfLoop=10 \
            -e -o ./results/performance-report
        
      - name: Copy Results from Container
        run: docker cp spring_boot_app:/app/results ./results

      - name: Upload JMeter Test Result, Logs and reports
        uses: actions/upload-artifact@v3
        with:
          name: performance-test-${{ github.run_id }}
          path: ./results

  verify-result-and-deploy-report:
    runs-on: ubuntu-latest
    needs: [jmeter-load-test, jmeter-performance-test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download Load Test Artifacts
        uses: actions/download-artifact@v3
        with:
          name: load-test-${{ github.run_id }}

      - name: Download Performance Test Artifacts
        uses: actions/download-artifact@v3
        with:
          name: performance-test-${{ github.run_id }}

      - name: Create Report Directory
        run: mkdir -p report
    
      - name: Move Load Report to Report Directory
        run: mv load-report report/
    
      - name: Move Performance Report to Report Directory
        run: mv performance-report report/

      - name: Move Basic Index Html page
        run: mv index.html report/

      - name: Deploy JMeter Load Test Reports to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./report
          publish_branch: gh-pages-all

      - name: Check JMeter Load Test Results if it exceed 5%
        run: ./check_failure_rate.sh ./test_load_results.jtl 5
    
      - name: Check JMeter Performance Test Results if it exceed 5%
        run: ./check_failure_rate.sh ./test_performance_results.jtl 5
